<!DOCTYPE html>
<html lang="en">

<head>
    <title>Бурмалдак</title>
    <link rel="icon" href="icons/logo.ico" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" type="text/javascript" defer></script>
</head>

<body>
<div class="bg_heart_wrapper">
<img class="bg_heart" src="/icons/bg-heart.png">
</div>
<header class="main_header">
    <div class="rectangle_header"></div>
    <div class="header_container">
        <a href="index.html" class="icon-link"><img src="icons/positions.png"></a>
        <a href="game.html" class="icon-link"><img src="icons/game.png"></a>
        <a href="dice.html" class="icon-link"><img src="icons/dice.png"></a>
    </div>
</header>
<div class="main_container">
    <div class="difficulty-sections">
        <div class="difficulty-section" data-difficulty="simple">
            <h3 class="difficulty-title">Простые</h3>
            <button class="btn_difficulty" data-difficulty="simple">Поменять позу</button>
            <div class="images-container">
                <img class="difficulty-image" src="icons/simple.png" alt="">
            </div>
            <p class="difficulty-text">Простые позы для секса</p>
        </div>
        
        <div class="difficulty-section" data-difficulty="complex">
            <h3 class="difficulty-title">Сложные</h3>
            <button class="btn_difficulty" data-difficulty="complex">Поменять позу</button>
            <div class="images-container">
                <img class="difficulty-image" src="icons/hard.png" alt="">
            </div>
            <p class="difficulty-text">Сложные позы для секса</p>
        </div>
        
        <div class="difficulty-section" data-difficulty="extreme">
            <h3 class="difficulty-title">Оральные ласки</h3>
            <button class="btn_difficulty" data-difficulty="extreme">Поменять позу</button>
            <div class="images-container">
                <img class="difficulty-image" src="icons/lips.png" alt="">
            </div>
            <p class="difficulty-text">Для разогрева и окончания</p>
        </div>
    </div>
</div>



</body>

</html>
