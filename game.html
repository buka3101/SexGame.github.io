<!DOCTYPE html>
<html lang="en">

<head>
    <title>Бурмалдак</title>
    <link rel="icon" href="icons/logo.ico" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/game.js" type="text/javascript"></script>
</head>

<body>
<div class="bg_heart_wrapper">
<img class="bg_heart" src="/icons/bg-heart.png">
</div>
<header class="main_header">
    <div class="rectangle_header"></div>
    <div class="header_container">
        <a href="index.html" class="icon-link"><img src="/icons/positions.png"></a>
        <a href="game.html" class="icon-link"><img src="/icons/game.png"></a>
        <a href="dice.html" class="icon-link"><img src="/icons/dice.png"></a>
    </div>
</header>
<div class="main_container">
    <div class="sliders-container">
        <div class="slider-group">
            <label>Легкая:</label>
            <input type="range" class="difficulty-slider" data-difficulty="easy" min="1" max="50" value="10" step="1">
            <span class="slider-value">10</span>
        </div>
        <div class="slider-group">
            <label>Средняя:</label>
            <input type="range" class="difficulty-slider" data-difficulty="middle" min="1" max="50" value="10" step="1">
            <span class="slider-value">10</span>
        </div>
        <div class="slider-group">
            <label>Сложная:</label>
            <input type="range" class="difficulty-slider" data-difficulty="hard" min="1" max="50" value="10" step="1">
            <span class="slider-value">10</span>
        </div>
    </div>
    <button class="btn_difficulty" id="confirm-sliders" style="margin: 20px auto; display: block; width: 300px;">Подтвердить количество заданий</button>
    <div class="game-container" style="display: flex; gap: 20px;">
        <div class="difficulty-sections">
            <div class="difficulty-section" data-person="man">
                <h3 class="difficulty-title" id="man-difficulty-title">Егор</h3>
                <div class="difficulty-progress" id="man-progress"></div>
                <p class="difficulty-text" id="man-task">Нажмите кнопку для выбора задания</p>
                <button class="btn_difficulty" data-person="man">Выбрать задание</button>
            </div>
            
            <div class="difficulty-section" data-person="woman">
                <h3 class="difficulty-title" id="woman-difficulty-title">Даша</h3>
                <div class="difficulty-progress" id="woman-progress"></div>
                <p class="difficulty-text" id="woman-task">Нажмите кнопку для выбора задания</p>
                <button class="btn_difficulty" data-person="woman">Выбрать задание</button>
            </div>
        </div>
        <div class="timer-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 150px;">
            <div id="timer-display" style="font-size: 40px; color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); margin-bottom: 10px;">01:00</div>
            <button class="btn_difficulty" id="start-timer" style="width: 100%;">Старт</button>
            <button class="btn_difficulty" id="reset-timer" style="width: 100%; margin-top: 10px;">Сброс</button>
        </div>
    </div>
</div>
<div class="notification-container" id="notification-container"></div>

</body>

</html>
